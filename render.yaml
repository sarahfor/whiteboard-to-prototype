services:
  - type: web
    name: whiteboard-to-prototype
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5
      - key: DATA_ROOT
        value: /var/data/whiteboard-to-prototype
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: whiteboard-to-prototype-data
      mountPath: /var/data/whiteboard-to-prototype
      sizeGB: 5
