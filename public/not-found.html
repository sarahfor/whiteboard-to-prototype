<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototype Not Found</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            --bg: #eef5ff;
            --ink: #10213a;
            --muted: #60718d;
            --accent: #2563eb;
            --glass-border: rgba(255, 255, 255, 0.48);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            position: relative;
            padding: 24px;
            background: linear-gradient(180deg, var(--bg) 0%, #ffffff 100%);
            color: var(--ink);
            overflow: hidden;
        }

        .card {
            position: relative;
            overflow: hidden;
            width: min(620px, 100%);
            padding: 32px;
            border-radius: 28px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0.16)),
                rgba(255, 255, 255, 0.2);
            border: 1px solid var(--glass-border);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(28px) saturate(165%);
            text-align: center;
        }

        .card::after {
            content: "";
            position: absolute;
            inset: 1px 1px auto 1px;
            height: 46%;
            border-radius: inherit;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0));
            pointer-events: none;
        }

        h1 {
            margin: 0 0 14px;
            font-size: clamp(32px, 6vw, 54px);
            line-height: 0.98;
            letter-spacing: -0.04em;
        }

        p {
            margin: 0 0 22px;
            color: var(--muted);
            line-height: 1.7;
        }

        a {
            display: inline-block;
            padding: 14px 20px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.92) 0%, rgba(14, 165, 233, 0.86) 100%);
            color: white;
            text-decoration: none;
            font-weight: 800;
            box-shadow: 0 18px 36px rgba(37, 99, 235, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.34);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Prototype not found</h1>
        <p>The preview you requested is no longer available or has not finished generating yet.</p>
        <a href="/">Back to builder</a>
    </div>
</body>
</html>
