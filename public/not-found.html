<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototype Not Found</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #ffffff;
            --ink: #0f172a;
            --muted: #5b6b84;
            --line: rgba(37, 99, 235, 0.12);
            --surface: rgba(255, 255, 255, 0.94);
            --accent: #2563eb;
            --accent-2: #0ea5e9;
            --shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
            font-family: "Avenir Next", "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--ink);
        }

        body {
            position: relative;
            display: grid;
            place-items: center;
            padding: 24px;
            overflow: hidden;
        }

        #networkCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.94;
        }

        .card {
            position: relative;
            z-index: 1;
            width: min(720px, 100%);
            padding: 36px;
            border-radius: 28px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .eyebrow {
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #91a0b9;
        }

        h1 {
            margin: 12px 0 14px;
            font-size: clamp(36px, 6vw, 58px);
            line-height: 0.98;
            letter-spacing: -0.045em;
            color: #4f5668;
        }

        p {
            margin: 0 auto 24px;
            max-width: 34ch;
            color: var(--muted);
            line-height: 1.7;
            font-size: 16px;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 54px;
            padding: 14px 22px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.92) 0%, rgba(14, 165, 233, 0.86) 100%);
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 800;
            box-shadow: 0 16px 30px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="networkCanvas" aria-hidden="true"></canvas>

    <div class="card">
        <div class="eyebrow">Preview unavailable</div>
        <h1>Prototype not found</h1>
        <p>The preview you requested is no longer available or has not finished generating yet. Return to the builder to start a fresh demo.</p>
        <a href="/">Back to builder</a>
    </div>

    <script>
        const networkCanvas = document.getElementById('networkCanvas');
        const context = networkCanvas.getContext('2d');

        if (context) {
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const particles = [];
            const particleCount = prefersReducedMotion
                ? 28
                : Math.min(72, Math.max(42, Math.floor(window.innerWidth / 22)));

            function resizeCanvas() {
                const dpr = window.devicePixelRatio || 1;
                networkCanvas.width = Math.floor(window.innerWidth * dpr);
                networkCanvas.height = Math.floor(window.innerHeight * dpr);
                context.setTransform(dpr, 0, 0, dpr, 0, 0);
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * window.innerWidth;
                    this.y = Math.random() * window.innerHeight;
                    this.vx = (Math.random() - 0.5) * 0.24;
                    this.vy = (Math.random() - 0.5) * 0.24;
                    this.size = Math.random() * 2.2 + 1;
                }

                update() {
                    if (prefersReducedMotion) {
                        return;
                    }

                    this.x += this.vx;
                    this.y += this.vy;

                    if (this.x < -20 || this.x > window.innerWidth + 20) {
                        this.vx *= -1;
                    }

                    if (this.y < -20 || this.y > window.innerHeight + 20) {
                        this.vy *= -1;
                    }
                }

                draw() {
                    context.beginPath();
                    context.fillStyle = 'rgba(79, 172, 254, 0.42)';
                    context.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    context.fill();
                }
            }

            function seedParticles() {
                particles.length = 0;
                for (let index = 0; index < particleCount; index += 1) {
                    particles.push(new Particle());
                }
            }

            function drawConnections() {
                for (let i = 0; i < particles.length; i += 1) {
                    const first = particles[i];

                    for (let j = i + 1; j < particles.length; j += 1) {
                        const second = particles[j];
                        const dx = first.x - second.x;
                        const dy = first.y - second.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance > 140) {
                            continue;
                        }

                        context.strokeStyle = `rgba(79, 172, 254, ${0.2 - distance / 850})`;
                        context.lineWidth = 1;
                        context.beginPath();
                        context.moveTo(first.x, first.y);
                        context.lineTo(second.x, second.y);
                        context.stroke();
                    }
                }
            }

            function render() {
                context.clearRect(0, 0, window.innerWidth, window.innerHeight);

                particles.forEach((particle) => {
                    particle.update();
                    particle.draw();
                });

                drawConnections();

                if (!prefersReducedMotion) {
                    window.requestAnimationFrame(render);
                }
            }

            resizeCanvas();
            seedParticles();
            render();

            window.addEventListener('resize', () => {
                resizeCanvas();
                seedParticles();
                if (prefersReducedMotion) {
                    render();
                }
            });
        }
    </script>
</body>
</html>
